<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D纸飞机星空大作战 - 音乐增强版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010816; font-family: 'Microsoft YaHei', sans-serif; cursor: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: #50E3C2; font-size: 26px; font-weight: bold; text-shadow: 0 0 10px rgba(80,227,194,0.5);
            pointer-events: none;
        }
        /* 开始界面和结束界面 */
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(15px); padding: 50px; border-radius: 40px; 
            border: 3px solid #50E3C2; box-shadow: 0 0 30px rgba(80,227,194,0.3);
            z-index: 100;
        }
        button { padding: 15px 40px; font-size: 24px; background: #50E3C2; border: none; border-radius: 50px; cursor: pointer; color: #010816; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #50E3C2; }
        
        /* 移动端适配 */
        @media (max-width: 600px) {
            #ui { font-size: 16px; top: 10px; left: 10px; right: 10px; }
            .overlay { padding: 25px; width: 85%; box-sizing: border-box; border-radius: 20px; }
            button { padding: 12px 24px; font-size: 18px; }
            h1 { font-size: 22px; }
            p { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="lives">❤️ ❤️ ❤️</div>
    <div id="timer">⏱️ 60s</div>
    <div id="score">✨ 0</div>
</div>

<div id="startScreen" class="overlay">
    <h1>🚀 纸飞机星空大作战</h1>
    <p>准备好出发了吗？</p>
    <button onclick="startGame()">开始挑战</button>
</div>

<div id="msg" class="overlay" style="display:none;">
    <h1 id="title">游戏结束</h1>
    <p id="final-score" style="font-size: 30px; margin: 20px 0;"></p>
    <button onclick="location.reload()">再来一局</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLives = document.getElementById('lives');
const uiTimer = document.getElementById('timer');
const uiScore = document.getElementById('score');
const msgBox = document.getElementById('msg');
const startScreen = document.getElementById('startScreen');

// 游戏逻辑变量
let score = 0, lives = 3, timeLeft = 60, gameOver = true;
let playerX = window.innerWidth / 2;
let bullets = [], enemies = [], stars = [], frameCount = 0;

// 音频上下文
let audioCtx;
function playBiuSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// 启动游戏
function startGame() {
    // 激活音效系统
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    // 播放背景音乐
    const bgMusic = new Audio('bgm.mp3'); // 确保文件名叫 bgm.mp3
    bgMusic.loop = true; // 设置循环播放
    bgMusic.volume = 0.5; // 音量调小一点，不刺耳
    bgMusic.play().catch(e => console.log("音乐播放被拦截:", e));
    
    startScreen.style.display = 'none';
    gameOver = false;
    
    // 启动计时器
    const gameInterval = setInterval(() => {
        if (!gameOver) {
            timeLeft--;
            uiTimer.innerText = `⏱️ ${timeLeft}s`;
            if (timeLeft <= 0) {
                end(true, gameInterval);
                bgMusic.pause(); // 游戏结束停止音乐
            }
        }
    }, 1000);
    draw();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 120}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3, o: Math.random()}));
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('mousemove', (e) => playerX = e.clientX);

// 添加移动端触控支持
window.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
        playerX = e.touches[0].clientX;
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
        playerX = e.touches[0].clientX;
        e.preventDefault(); // 阻止滑动页面的默认行为
    }
}, { passive: false });

function createEnemy() {
    const isBig = Math.random() > 0.8;
    enemies.push({
        x: 60 + Math.random() * (canvas.width - 120),
        y: -100,
        size: isBig ? 70 : 45,
        speed: isBig ? 1.1 : 1.6, // 适合7岁孩子的超慢速
        hue: Math.random() * 360
    });
}

function draw3DPlane(x, y, size, hue, isPlayer = false) {
    ctx.save();
    ctx.translate(x, y);
    if (!isPlayer) ctx.rotate(Math.PI);
    
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${hue}, 80%, 50%)`;

    // 左翼
    ctx.fillStyle = `hsl(${hue}, 70%, 40%)`;
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(-size, size/2);
    ctx.lineTo(0, size/4);
    ctx.fill();

    // 右翼
    ctx.fillStyle = `hsl(${hue}, 70%, 65%)`;
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size, size/2);
    ctx.lineTo(0, size/4);
    ctx.fill();

    ctx.restore();
}

function update() {
    if (gameOver) return;

    if (frameCount % 20 === 0) {
        bullets.push({ x: playerX, y: canvas.height - 80 });
    }

    bullets.forEach((b, i) => {
        b.y -= 7;
        if (b.y < 0) bullets.splice(i, 1);
    });

    if (frameCount % 75 === 0) createEnemy();
    
    enemies.forEach((e, i) => {
        e.y += e.speed;
        if (e.y > canvas.height + 50) {
            enemies.splice(i, 1);
            lives--;
            uiLives.innerText = '❤️ '.repeat(Math.max(0, lives));
            if (lives <= 0) end(false);
        }

        bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
                playBiuSound(); // 触发Biu音效
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += (e.size > 50 ? 5 : 15);
                uiScore.innerText = `✨ ${score}`;
            }
        });
    });
    frameCount++;
}

function draw() {
    if (gameOver && timeLeft <= 0) return;
    
    ctx.fillStyle = '#010816';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(frameCount*0.02 + s.o*10))})`;
        ctx.fillRect(s.x, (s.y + frameCount*0.2)%canvas.height, s.s, s.s);
    });

    bullets.forEach(b => {
        ctx.fillStyle = '#50E3C2';
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#50E3C2";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
        ctx.fill();
    });

    enemies.forEach(e => draw3DPlane(e.x, e.y, e.size, e.hue));
    draw3DPlane(playerX, canvas.height - 80, 50, 180, true);

    update();
    requestAnimationFrame(draw);
}

function end(win, interval) {
    clearInterval(interval);
    gameOver = true;
    msgBox.style.display = 'block';
    document.getElementById('title').innerText = win ? "🌟 任务圆满完成！" : "🚀 没关系，再练一次吧！";
    document.getElementById('final-score').innerText = `最终得分: ${score}`;
}
</script>
</body>
</html>
